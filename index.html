<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Para Larissa ❤️</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  opacity: 0;
  transition: opacity 2s;
}

.slide.active {
  opacity: 1;
}

.slide img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(0.5);
}

.text {
  position: absolute;
  bottom: 15%;
  width: 100%;
  text-align: center;
  font-size: 22px;
  padding: 0 20px;
}

.title {
  position: absolute;
  top: 40%;
  width: 100%;
  text-align: center;
  font-size: 32px;
}

.btn {
  position: absolute;
  top: 60%;
  left: 50%;
  transform: translateX(-50%);
  padding: 12px 25px;
  background: #ff4d6d;
  border: none;
  border-radius: 10px;
  color: white;
  font-size: 16px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="startScreen" class="title">
  Para Larissa ❤️<br><br>
  <button class="btn" onclick="start()">Clique aqui</button>
</div>

<audio id="music">
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<div class="slide">
  <img src="foto1.jpg">
  <div class="text">Hoje é um dia muito especial…</div>
</div>

<div class="slide">
  <img src="foto2.jpg">
  <div class="text">O dia em que o mundo ganhou você ❤️</div>
</div>

<div class="slide">
  <img src="foto3.jpg">
  <div class="text">Feliz aniversário, meu amor 🎉</div>
</div>

<div class="slide">
  <img src="foto4.jpg">
  <div class="text">Esses 2 anos ao seu lado foram os melhores da minha vida…</div>
</div>

<div class="slide">
  <img src="foto2.jpg">
  <div class="text">Você é tudo pra mim… eu te amo ❤️</div>
</div>

<div class="slide">
  <img src="foto1.jpg">
  <div class="text">Com amor, Elias 💖</div>
</div>

<script>
let slides = document.querySelectorAll(".slide");
let index = 0;

function start() {
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("music").play();
  showSlide();
}

function showSlide() {
  slides.forEach(s => s.classList.remove("active"));
  slides[index].classList.add("active");

  index++;
  if (index < slides.length) {
    setTimeout(showSlide, 5000);
  }
}
</script>

</body>
</html>
