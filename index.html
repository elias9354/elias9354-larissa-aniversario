<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Larissa ❤️</title>
    <style>
        body {
            margin: 0;
            background: black;
            overflow: hidden;
            font-family: Arial, sans-serif;
            color: white;
        }

        /* Tela inicial */
        #startScreen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 100%;
        }

        button {
            padding: 16px 32px;
            background: #ff4d6d;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        /* Conteúdo principal */
        #content {
            display: none;
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #foto {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 2s ease, transform 8s ease;
            filter: brightness(0.5);
        }

        #foto.active {
            opacity: 1;
            transform: scale(1.08);
        }

        #texto {
            position: absolute;
            bottom: 15%;
            width: 100%;
            text-align: center;
            font-size: 28px;
            padding: 0 20px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        /* Corações flutuantes */
        .heart {
            position: absolute;
            color: #ff4d6d;
            animation: subir 7s linear infinite;
            z-index: 10;
            pointer-events: none;
        }

        @keyframes subir {
            0%   { transform: translateY(110vh) scale(0.8); opacity: 1; }
            100% { transform: translateY(-20vh) scale(1.2); opacity: 0; }
        }

        /* Tela final */
        #final {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            text-align: center;
            font-size: 38px;
            opacity: 0;
            transition: opacity 4s ease;
            pointer-events: none;
        }

        #final button {
            margin-top: 30px;
            pointer-events: all;
        }
    </style>
</head>
<body>

    <div id="startScreen">
        <h1>Para Larissa ❤️</h1>
        <button id="startBtn">Clique aqui</button>
    </div>

    <audio id="music" preload="auto">
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <div id="content">
        <img id="foto" alt="">
        <div id="texto"></div>
    </div>

    <div id="final">
        Eu te amo, Larissa ❤️<br><br>
        Feliz Aniversário 🎉<br><br>
        - Elias 💖
        <br><br>
        <button onclick="location.reload()">Ver novamente</button>
    </div>

    <script>
        const fotos = [
            "foto1.jpg", "foto2.jpg", "foto3.jpg", "foto4.jpg",
            "foto5.jpg", "foto6.jpg", "foto7.jpg", "foto8.jpg",
            "foto9.jpg", "foto10.jpg", "foto11.jpg", "foto12.jpg"
        ];

        const textos = [
            "Hoje é o seu dia...",
            "O dia mais especial do ano...",
            "Porque foi o dia que você nasceu ❤️",
            "E mudou completamente a minha vida...",
            "Esses 2 anos com você...",
            "Foram os melhores da minha vida...",
            "Cada momento ao seu lado...",
            "Vale mais do que qualquer coisa...",
            "Seu sorriso é o meu lugar favorito...",
            "Você ilumina tudo ao meu redor...",
            "Eu não me imagino sem você...",
            "Eu te amo mais do que palavras 💖"
        ];

        let indice = 0;
        let jaIniciou = false;

        // Espera o DOM estar completamente carregado
        document.addEventListener("DOMContentLoaded", () => {
            const startBtn = document.getElementById("startBtn");

            startBtn.addEventListener("click", iniciarApresentacao);
        });

        function iniciarApresentacao() {
            if (jaIniciou) return;
            jaIniciou = true;

            document.getElementById("startScreen").style.display = "none";
            document.getElementById("content").style.display = "block";

            const music = document.getElementById("music");
            music.play().catch(() => {});

            criarCoracoes();
            mostrarProxima();
        }

        function escrever(texto) {
            const el = document.getElementById("texto");
            el.innerHTML = "";
            let j = 0;

            function digitar() {
                if (j < texto.length) {
                    el.innerHTML += texto[j];
                    j++;
                    setTimeout(digitar, 40);
                }
            }
            digitar();
        }

        function mostrarProxima() {
            if (indice >= fotos.length) {
                document.getElementById("final").style.opacity = 1;
                return;
            }

            const fotoEl = document.getElementById("foto");

            // Remove animação anterior
            fotoEl.classList.remove("active");

            setTimeout(() => {
                fotoEl.src = fotos[indice];
                fotoEl.classList.add("active");
                escrever(textos[indice]);
            }, 600);

            indice++;
            setTimeout(mostrarProxima, 5200); // tempo total por slide
        }

        function criarCoracoes() {
            setInterval(() => {
                const heart = document.createElement("div");
                heart.className = "heart";
                heart.innerText = "❤️";
                heart.style.left = Math.random() * 100 + "%";
                heart.style.fontSize = (Math.random() * 28 + 18) + "px";
                heart.style.animationDuration = (Math.random() * 4 + 6) + "s";
                document.body.appendChild(heart);

                setTimeout(() => heart.remove(), 8000);
            }, 180);
        }
    </script>
</body>
</html>
